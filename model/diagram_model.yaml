# Source canonique du schéma EER - Plateforme de résumés de cours
# Modifier ce fichier pour faire évoluer le modèle. Régénérer avec: make build

metadata:
  title: "Plateforme de resumes de cours - Modele ER"
  description: "Modele entite-association complet pour le projet INFOH303"

entites:
  Utilisateur:
    attributs:
      - { nom: idUtilisateur, pk: true }
      - { nom: nomUtilisateur }
      - { nom: email, uq: true }
      - { nom: dateInscription }

  ProfilUtilisateur:
    attributs:
      - { nom: idUtilisateur, pk: true, fk: true }
      - { nom: pointsTotal }
      - { nom: niveau, derive: true }
      - { nom: idTitreActif, fk: true, nullable: true }

  Cours:
    attributs:
      - { nom: codeCours, pk: true }
      - { nom: nomCours }
      - { nom: faculte }

  AnneeAcademique:
    attributs:
      - { nom: idAnnee, pk: true }
      - { nom: libelleAnnee, uq: true }
      - { nom: dateDebut }
      - { nom: dateFin }

  CoursAnnee:
    attributs:
      - { nom: codeCours, pk: true, fk: true }
      - { nom: idAnnee, pk: true, fk: true }

  Resume:
    attributs:
      - { nom: idResume, pk: true }
      - { nom: idAuteur, fk: true }
      - { nom: codeCours, fk: true }
      - { nom: idAnnee, fk: true }
      - { nom: titre }
      - { nom: description }
      - { nom: datePublication }
      - { nom: visibilite }
      - { nom: noteMoyenne, derivee: true }

  Evaluation:
    attributs:
      - { nom: idEvaluateur, pk: true, fk: true }
      - { nom: idResume, pk: true, fk: true }
      - { nom: note }
      - { nom: commentaire }
      - { nom: dateEvaluation }

  TransactionPoints:
    attributs:
      - { nom: idTransaction, pk: true }
      - { nom: idUtilisateur, fk: true }
      - { nom: typeTransaction, qualif: "gain/depense" }
      - { nom: nbPoints }
      - { nom: dateTransaction }
      - { nom: motif }
      - { nom: sourceType, qualif: "publication/evaluation/achat/ajustement" }
      - { nom: sourceId, nullable: true }

  ObjetCosmetique:
    attributs:
      - { nom: idObjet, pk: true }
      - { nom: nom }
      - { nom: description }
      - { nom: prixPoints }
      - { nom: typeObjet }

  AchatObjet:
    attributs:
      - { nom: idAchat, pk: true }
      - { nom: idUtilisateur, fk: true }
      - { nom: idObjet, fk: true }
      - { nom: dateAchat }
      - { nom: prixPointsPaye }

  PossessionObjet:
    attributs:
      - { nom: idPossession, pk: true }
      - { nom: idUtilisateur, fk: true }
      - { nom: idObjet, fk: true }
      - { nom: idAchat, fk: true }
      - { nom: dateObtention }
      - { nom: estEquipe }

  ClassementCourant:
    attributs:
      - { nom: idUtilisateur, pk: true, fk: true }
      - { nom: rang }
      - { nom: pointsConstates }
      - { nom: dateCalcul }

# Associations: source -> cible avec cardinalités (min,max)
# taillabel = cardinalité côté source, headlabel = côté cible
relations:
  - source: Cours
    cible: CoursAnnee
    label: concerne
    taillabel: "(1,n)"
    headlabel: "(1,1)"

  - source: AnneeAcademique
    cible: CoursAnnee
    label: situe
    taillabel: "(1,n)"
    headlabel: "(1,1)"

  - source: Utilisateur
    cible: Resume
    label: publie
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: CoursAnnee
    cible: Resume
    label: regroupe
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: Utilisateur
    cible: ProfilUtilisateur
    label: possedeProfil
    taillabel: "(1,1)"
    headlabel: "(1,1)"

  - source: Utilisateur
    cible: Evaluation
    label: effectue
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: Resume
    cible: Evaluation
    label: recoit
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: Utilisateur
    cible: TransactionPoints
    label: possedeHistorique
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: Utilisateur
    cible: AchatObjet
    label: achete
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: ObjetCosmetique
    cible: AchatObjet
    label: concerneAchat
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: Utilisateur
    cible: PossessionObjet
    label: possede
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: ObjetCosmetique
    cible: PossessionObjet
    label: estPossedeVia
    taillabel: "(0,n)"
    headlabel: "(1,1)"

  - source: AchatObjet
    cible: PossessionObjet
    label: creePossession
    taillabel: "(1,1)"
    headlabel: "(1,1)"

  - source: Utilisateur
    cible: ClassementCourant
    label: figureDans
    taillabel: "(0,1)"
    headlabel: "(1,1)"

liens_notes: []

notes: {}
